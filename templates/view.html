<!DOCTYPE html>
<html>
<head>
    <title>Data View</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="card shadow-sm p-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 gap-3">
                <h2 class="mb-0">db-worksync - {{table}} - total: {{total_rows}}</h2>                        
                <form action="/upload" method="POST" enctype="multipart/form-data" class="d-flex gap-2">
                    <input type="file" name="file_excel" class="form-control form-control-sm" accept=".csv" required>
                    <button type="submit" class="btn btn-success btn-sm">Upload</button>
                </form>
            </div>

            <div class="table-responsive">
                {{table_html | safe}}
            </div>
        </div>
    </div>
</body>
</html>
